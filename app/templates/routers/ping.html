{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center gap-4 mb-6">
        <a href="/routers/{{ router.id }}" class="text-gray-500 hover:text-gray-700">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Ping {{ router.name }}</h1>
    </div>

    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-2">IP Address</label>
            <input type="text" id="pingIp" value="{{ router.ip_address }}" 
                   class="w-full px-4 py-2 border rounded-lg bg-gray-50" readonly>
        </div>
        <button hx-post="/api/routers/{{ router.id }}/ping"
                hx-trigger="click"
                hx-swap="innerHTML"
                hx-target="#pingResult"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
            <span id="pingBtnText">Run Ping</span>
        </button>
    </div>

    <div id="pingResult" class="bg-white rounded-lg shadow p-6">
        <p class="text-gray-500 text-center">Click "Run Ping" to test connectivity</p>
    </div>
</div>

<script>
document.body.addEventListener('htmx:beforeSend', function(event) {
    if (event.detail.target.id === 'pingResult') {
        document.getElementById('pingBtnText').textContent = 'Pinging...';
    }
});
</script>
{% endblock %}
