{% extends "base.html" %}

{% block title %}Ajouter une Interface - NETCONF Router Manager{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="/routers/{{ router_id }}" class="text-indigo-600 hover:text-indigo-800 mb-4 inline-block">
        <i class="fas fa-arrow-left mr-2"></i>Retour au routeur
    </a>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">
        <i class="fas fa-ethernet mr-3 text-indigo-600"></i>Ajouter une Interface
    </h1>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow p-6">
        <form id="interface-form" class="space-y-6">
            <input type="hidden" name="router_id" value="{{ router_id }}">

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                        Nom de l'interface <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="name" name="name" required
                        placeholder="ex: GigabitEthernet0/0"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                        Description
                    </label>
                    <input type="text" id="description" name="description"
                        placeholder="ex: Interface WAN"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="ip_address" class="block text-sm font-medium text-gray-700 mb-2">
                        Adresse IP
                    </label>
                    <input type="text" id="ip_address" name="ip_address"
                        placeholder="ex: 192.168.1.1"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label for="subnet_mask" class="block text-sm font-medium text-gray-700 mb-2">
                        Masque
                    </label>
                    <select id="subnet_mask" name="subnet_mask"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">Sélectionner</option>
                        <option value="255.255.255.0">/24 (255.255.255.0)</option>
                        <option value="255.255.255.128">/25 (255.255.255.128)</option>
                        <option value="255.255.255.192">/26 (255.255.255.192)</option>
                        <option value="255.255.255.224">/27 (255.255.255.224)</option>
                        <option value="255.255.255.240">/28 (255.255.255.240)</option>
                        <option value="255.255.255.248">/29 (255.255.255.248)</option>
                        <option value="255.255.255.252">/30 (255.255.255.252)</option>
                        <option value="255.255.0.0">/16 (255.255.0.0)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="vlan_id" class="block text-sm font-medium text-gray-700 mb-2">
                        VLAN
                    </label>
                    <select id="vlan_id" name="vlan_id"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">Aucun</option>
                        {% for vlan in vlans %}
                        <option value="{{ vlan.id }}">VLAN {{ vlan.vlan_id }} - {{ vlan.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="port_mode" class="block text-sm font-medium text-gray-700 mb-2">
                        Mode
                    </label>
                    <select id="port_mode" name="port_mode"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="access">Access</option>
                        <option value="trunk">Trunk</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="flex items-center">
                    <input type="checkbox" name="enabled" value="true" checked
                        class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <span class="ml-2 text-gray-700">Interface activée (no shutdown)</span>
                </label>
            </div>

            <div class="flex justify-end space-x-4 pt-4 border-t">
                <a href="/routers/{{ router_id }}" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    Annuler
                </a>
                <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-save mr-2"></i>Créer l'Interface
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('interface-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const form = e.target;
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    data.enabled = form.querySelector('input[name="enabled"]').checked;
    
    try {
        const response = await fetch('/api/routers/' + data.router_id + '/interfaces', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            const result = await response.json();
            showToast('Interface créée avec succès', 'success');
            setTimeout(() => window.location.href = '/routers/' + data.router_id, 1000);
        } else {
            const error = await response.json();
            showToast(error.detail || 'Erreur lors de la création', 'error');
        }
    } catch (error) {
        showToast('Erreur: ' + error.message, 'error');
    }
});
</script>
{% endblock %}
