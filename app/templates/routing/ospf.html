{% extends "base.html" %}

{% block title %}Configuration OSPF - NETCONF Router Manager{% endblock %}

{% block content %}
<div class="mb-8">
    <a href="/routers/{{ router_id }}" class="text-indigo-600 hover:text-indigo-800 mb-4 inline-block">
        <i class="fas fa-arrow-left mr-2"></i>Retour au routeur
    </a>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">
        <i class="fas fa-network-wired mr-3 text-indigo-600"></i>Configuration OSPF
    </h1>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-lg shadow p-6">
        <form id="ospf-form" class="space-y-6">
            <input type="hidden" name="router_id" value="{{ router_id }}">

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label for="process_id" class="block text-sm font-medium text-gray-700 mb-2">
                        Process ID <span class="text-red-500">*</span>
                    </label>
                    <input type="number" id="process_id" name="process_id" required
                        min="1" max="65535" value="1"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label for="router_id_address" class="block text-sm font-medium text-gray-700 mb-2">
                        Router ID
                    </label>
                    <input type="text" id="router_id_address" name="router_id_address"
                        placeholder="ex: 10.0.0.1"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <div class="border-t pt-6">
                <h3 class="text-lg font-semibold mb-4">Réseau à annoncer</h3>
                
                <div class="grid grid-cols-3 gap-6">
                    <div>
                        <label for="network" class="block text-sm font-medium text-gray-700 mb-2">
                            Réseau <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="network" name="network" required
                            placeholder="ex: 192.168.0.0"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label for="wildcard" class="block text-sm font-medium text-gray-700 mb-2">
                            Wildcard <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="wildcard" name="wildcard" required
                            placeholder="ex: 0.0.255.255"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <p class="text-xs text-gray-500 mt-1">Inverse du masque</p>
                    </div>

                    <div>
                        <label for="area_id" class="block text-sm font-medium text-gray-700 mb-2">
                            Area ID <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="area_id" name="area_id" required
                            min="0" max="4294967295" value="0"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                    Description
                </label>
                <input type="text" id="description" name="description"
                    placeholder="ex: OSPF Area 0 backbone"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="flex items-center">
                    <input type="checkbox" name="enabled" value="true" checked
                        class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                    <span class="ml-2 text-gray-700">Configuration activée</span>
                </label>
            </div>

            <div class="flex justify-end space-x-4 pt-4 border-t">
                <a href="/routers/{{ router_id }}" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                    Annuler
                </a>
                <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    <i class="fas fa-save mr-2"></i>Enregistrer OSPF
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('ospf-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const form = e.target;
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());
    data.enabled = form.querySelector('input[name="enabled"]').checked;
    
    try {
        const response = await fetch('/api/routers/' + data.router_id + '/ospf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            const result = await response.json();
            showToast('Configuration OSPF enregistrée', 'success');
            setTimeout(() => window.location.href = '/routers/' + data.router_id, 1000);
        } else {
            const error = await response.json();
            showToast(error.detail || 'Erreur lors de la création', 'error');
        }
    } catch (error) {
        showToast('Erreur: ' + error.message, 'error');
    }
});
</script>
{% endblock %}
